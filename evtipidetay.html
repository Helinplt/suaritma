        }

            position: sticky;
            top: 0;

        }

        .topbar-inner {
            min-height: 78px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            width: 54px;
            height: 54px;

            align-items: center;
            justify-content: center;
            color: #fff;

            font-size: 22px;
        }

        .brand-text h2 {

        .brand-text p {

            color: #6b7280;
        }

            color: #fff;

            font-weight: 700;

            .back-btn:hover {

            }

        .detail-page {
            padding: 50px 0 80px;
        }

        .detail-layout {

            gap: 30px;
            align-items: start;
        }

        .gallery-card,
        .content-card,

            border: 1px solid #e8edf5;

        .gallery-card {

        }

            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

            .main-image img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }

        .thumbs {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 10px;
        }

            border-radius: 14px;
            background: #f8fbff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            cursor: pointer;

            .thumb img {

                max-height: 100%;

            }

            .thumb.active,

            padding: 30px;
        }

            font-size: 13px;
            font-weight: 700;
            margin-bottom: 14px;

            line-height: 1.2;
            color: #17388f;
            margin-bottom: 14px;
        }

            color: #6b7280;
            margin-bottom: 20px;
        }

            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 22px;

        .price {

            font-weight: 800;
            color: #111827;
        }

        .stock {

            align-items: center;
            justify-content: center;

            border-radius: 999px;
            background: #eefaf1;
            color: #15803d;
            font-size: 13px;
            font-weight: 700;
        }

        .action-row {

            gap: 12px;
            flex-wrap: wrap;

            color: #17388f;

    <script>
        const menuToggle = document.getElementById("menu-toggle");
        const navbar = document.getElementById("navbar");
        const dropdownToggles = document.querySelectorAll(".dropdown-toggle");

        menuToggle.addEventListener("click", () => {
            navbar.classList.toggle("active");
        });

        dropdownToggles.forEach(toggle => {
            toggle.addEventListener("click", function (e) {
                if (window.innerWidth <= 992) {
                    e.preventDefault();

                    const parentDropdown = this.parentElement;

                    document.querySelectorAll(".dropdown").forEach(drop => {
                        if (drop !== parentDropdown) {
                            drop.classList.remove("active");
                        }
                    });

                    parentDropdown.classList.toggle("active");
                }
            });
        });

        window.addEventListener("resize", () => {
            if (window.innerWidth > 992) {
                document.querySelectorAll(".dropdown").forEach(drop => {
                    drop.classList.remove("active");
                });
                navbar.classList.remove("active");
            }
        });
    </script>
