            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        a {
            text-decoration: none;
        }

        img {
            display: block;
            max-width: 100%;
        }

        .detail-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #e8edf5;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-inner {
            min-height: 78px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            background: linear-gradient(135deg,#58b5ff,#17388f);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 800;
            font-size: 22px;
        }

        .brand-text h2 {
            font-size: 20px;
            color: #17388f;
            margin-bottom: 3px;
        }

        .brand-text p {
            font-size: 13px;
            color: #6b7280;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            border-radius: 12px;
            background: #17388f;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            transition: .3s;
        }

            .back-btn:hover {
                background: #0f2d7c;
            }

        .detail-page {
            padding: 50px 0 80px;
        }

        .detail-layout {
            display: grid;
            grid-template-columns: 1.05fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .gallery-card,
        .content-card,
        .info-card {
            background: #fff;
            border: 1px solid #e8edf5;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,.05);
        }

        .gallery-card {
            padding: 22px;
        }

        .main-image {
            width: 100%;
            height: 500px;
            background: #f8fbff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

            .main-image img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }

        .thumbs {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 10px;
        }

        .thumb {
            height: 90px;
            border: 1px solid #e8edf5;
            border-radius: 14px;
            background: #f8fbff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            cursor: pointer;
            transition: .25s;
        }

            .thumb img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }

            .thumb.active,
            .thumb:hover {
                border-color: #17388f;
                box-shadow: 0 8px 18px rgba(23,56,143,.12);
            }

        .content-card {
            padding: 30px;
        }

        .badge {
            display: inline-block;
            padding: 7px 14px;
            border-radius: 999px;
            background: #eaf1ff;
            color: #17388f;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .product-title {
            font-size: 38px;
            line-height: 1.2;
            color: #17388f;
            margin-bottom: 14px;
        }

        .product-short {
            font-size: 16px;
            line-height: 1.8;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .price {
            font-size: 34px;
            font-weight: 800;
            color: #111827;
        }

        .stock {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 14px;
            border-radius: 999px;
            background: #eefaf1;
            color: #15803d;
            font-size: 13px;
            font-weight: 700;
        }

        .action-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 170px;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            transition: .3s;
        }

        .btn-primary {
            background: #17388f;
            color: #fff;
        }

            }

        .btn-light {
            background: #f3f6fc;
            color: #17388f;
            border: 1px solid #dfe7f5;
        }

            .btn-light:hover {
                background: #eaf1ff;
            }

            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
        }

        .mini-box {
            background: #f8fbff;
            border: 1px solid #e8edf5;
            border-radius: 16px;
            padding: 16px;
        }

                margin-bottom: 6px;
            }

            .mini-box p {
                font-size: 13px;
                line-height: 1.6;
                color: #6b7280;
            }

        .bottom-area {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1.1fr .9fr;
            gap: 30px;
        }

        .info-card {
            padding: 28px;
        }

        .section-head {
            font-size: 24px;
            color: #17388f;
            margin-bottom: 18px;
        }

        .description {
            font-size: 15px;
            line-height: 1.85;
            color: #4b5563;
            margin-bottom: 18px;
        }

            display: grid;
            gap: 12px;
        }

                padding: 14px 16px;

    <script>
        const menuToggle = document.getElementById("menu-toggle");
        const navbar = document.getElementById("navbar");
        const dropdownToggles = document.querySelectorAll(".dropdown-toggle");

        menuToggle.addEventListener("click", () => {
            navbar.classList.toggle("active");
        });

        dropdownToggles.forEach(toggle => {
            toggle.addEventListener("click", function (e) {
                if (window.innerWidth <= 992) {
                    e.preventDefault();

                    const parentDropdown = this.parentElement;

                    document.querySelectorAll(".dropdown").forEach(drop => {
                        if (drop !== parentDropdown) {
                            drop.classList.remove("active");
                        }
                    });

                    parentDropdown.classList.toggle("active");
                }
            });
        });

        window.addEventListener("resize", () => {
            if (window.innerWidth > 992) {
                document.querySelectorAll(".dropdown").forEach(drop => {
                    drop.classList.remove("active");
                });
                navbar.classList.remove("active");
            }
        });
    </script>
